<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Cadastro de Clientes</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

{% include 'menu.html' %}

<div class="content">

<h2>Cadastro de Clientes</h2>

<div class="form-box">

<form method="POST" action="/salvar_cliente">

<div class="form-group">
<label>Nome</label>
<input type="text" name="nome" required>
</div>


<div class="row">

<div class="form-group">
<label>CPF</label>
<input type="text" id="cpf" name="cpf">
</div>

<div class="form-group">
<label>RG</label>
<input type="text" id="rg" name="rg">
</div>

<div class="form-group">
<label>Data de nascimento</label>
<input type="text" id="nascimento" name="nascimento">
</div>

</div>


<div class="row">

<div class="form-group">
<label>Rua</label>
<input type="text" name="rua">
</div>

<div class="form-group">
<label>Número</label>
<input type="text" name="numero">
</div>

</div>


<div class="row">

<div class="form-group">
<label>Cidade</label>
<input type="text" name="cidade">
</div>

<div class="form-group">
<label>Estado</label>
<input type="text" name="estado">
</div>

</div>


<div class="row">

<div class="form-group">
<label>Telefone</label>
<input type="text" id="telefone" name="telefone">
</div>

<div class="form-group">
<label>Celular</label>
<input type="text" id="celular" name="celular">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email">
</div>

</div>


<button type="submit">Salvar Cliente</button>

</form>

</div>


<!-- PESQUISA -->

<h3>Pesquisar Cliente</h3>

<form method="GET" action="/clientes">

<div class="row">

<div class="form-group">

<label>Pesquisar por</label>

<select name="tipo">

<option value="nome">Nome</option>

<option value="cpf">CPF</option>

</select>

</div>

<div class="form-group">

<label>Digite a busca</label>

<input type="text" name="busca">

</div>

<div class="form-group">

<label></label>

<button type="submit">Pesquisar</button>

</div>

</div>

</form>


<!-- TABELA DE CLIENTES -->

<h3>Clientes cadastrados</h3>

<table class="tabela-clientes">

<tr>

<th>Nome</th>
<th>CPF</th>
<th>Telefone</th>
<th>Detalhes</th>
<th>Excluir</th>

</tr>

{% for cliente in clientes %}

<tr>

<td>{{ cliente.nome }}</td>
<td>{{ cliente.cpf }}</td>
<td>{{ cliente.celular }}</td>

<td>

<a href="/cliente/{{ cliente.id }}" class="btn-detalhe">
🔍
</a>

</td>

<td>

<a href="/excluir_cliente/{{ cliente.id }}" class="btn-excluir">
🗑
</a>

</td>

</tr>

{% endfor %}

</table>


<!-- SCRIPTS DE MÁSCARA -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
