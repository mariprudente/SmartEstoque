<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Controle de Estoque</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

{% include 'menu.html' %}

<div class="content">

<h2>Controle de Estoque</h2>

<div class="tabs">

<button onclick="openTab('movimentacao')">Movimentação</button>

<button onclick="openTab('historico')">Histórico</button>

</div>


<!-- ABA MOVIMENTAÇÃO -->

<div id="movimentacao" class="tabcontent">

<h3>Movimentar Produto</h3>

<form method="POST" action="/movimentar_estoque">

<label>Produto</label>

<select name="produto">

{% for produto in produtos %}

<option value="{{ produto.id }}">
{{ produto.nome }}
</option>

{% endfor %}

</select>


<label>Tipo</label>

<select name="tipo">

<option value="entrada">Entrada</option>
<option value="saida">Saída</option>

</select>


<label>Quantidade</label>

<input type="number" name="quantidade">


<label>Observação</label>

<textarea name="observacao"></textarea>


<br><br>

<button type="submit">

Registrar movimentação

</button>

</form>

</div>



<!-- ABA HISTÓRICO -->

<div id="historico" class="tabcontent" style="display:none">

<h3>Histórico de Movimentações</h3>

<table class="tabela-clientes">

<tr>

<th>Data</th>
<th>Produto</th>
<th>Tipo</th>
<th>Quantidade</th>
<th>Observação</th>

</tr>

{% for mov in movimentacoes %}

<tr>

<td>{{ mov.data }}</td>

<td>{{ mov.produto.nome }}</td>

<td>{{ mov.tipo }}</td>

<td>{{ mov.quantidade }}</td>

<td>{{ mov.observacao }}</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
