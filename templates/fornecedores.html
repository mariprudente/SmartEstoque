<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Fornecedores</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

{% include 'menu.html' %}

<div class="content">

<h2>Fornecedores</h2>

<div class="tabs">

<button class="tablink" onclick="openTab('cadastro')">Cadastro</button>
<button class="tablink" onclick="openTab('consulta')">Consulta</button>

</div>


<!-- ABA CADASTRO -->

<div id="cadastro" class="tabcontent">

<h3>Cadastro de Fornecedor</h3>

<form method="POST" action="/salvar_fornecedor">

<div class="form-group">
<label>Razão Social</label>
<input type="text" name="razao_social" required>
</div>

<div class="form-group">
<label>CNPJ</label>
<input type="text" id="cnpj" name="cnpj">
</div>

<div class="form-group">
<label>Nome do contato</label>
<input type="text" name="contato">
</div>

<div class="form-group">
<label>CEP</label>
<input type="text" id="cep" name="cep">
</div>

<div class="form-group">
<label>Endereço</label>
<input type="text" name="endereco">
</div>

<div class="form-group">
<label>Número</label>
<input type="text" name="numero">
</div>

<div class="form-group">
<label>Complemento</label>
<input type="text" name="complemento">
</div>

<div class="form-group">
<label>Bairro</label>
<input type="text" name="bairro">
</div>

<div class="form-group">
<label>Cidade</label>
<input type="text" name="cidade">
</div>

<div class="form-group">
<label>UF</label>

<select name="uf">

<option>AC</option>
<option>AL</option>
<option>AP</option>
<option>AM</option>
<option>BA</option>
<option>CE</option>
<option>DF</option>
<option>ES</option>
<option>GO</option>
<option>MA</option>
<option>MT</option>
<option>MS</option>
<option>MG</option>
<option>PA</option>
<option>PB</option>
<option>PR</option>
<option>PE</option>
<option>PI</option>
<option>RJ</option>
<option>RN</option>
<option>RS</option>
<option>RO</option>
<option>RR</option>
<option>SC</option>
<option>SP</option>
<option>SE</option>
<option>TO</option>

</select>

</div>

<div class="form-group">
<label>Telefone</label>
<input type="text" id="telefone_fornecedor" name="telefone">
</div>

<div class="form-group">
<label>Celular</label>
<input type="text" id="celular_fornecedor" name="celular">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email">
</div>

<div class="form-group">
<label>Observações</label>
<textarea name="observacoes" rows="5" cols="100"></textarea>
</div>

<button type="submit">Salvar Fornecedor</button>

</form>

</div>


<!-- ABA CONSULTA -->

<div id="consulta" class="tabcontent" style="display:none">

<h3>Consultar Fornecedor</h3>

<form method="GET" action="/fornecedores">

<input type="text" name="busca" placeholder="Digite o fornecedor">

<button type="submit">Buscar</button>

</form>

<br>

<table class="tabela-clientes">

<tr>

<th>Razão Social</th>
<th>CNPJ</th>
<th>Telefone</th>
<th>Detalhes</th>
<th>Excluir</th>

</tr>

{% for fornecedor in fornecedores %}

<tr>

<td>{{ fornecedor.razao_social }}</td>
<td>{{ fornecedor.cnpj }}</td>
<td>{{ fornecedor.telefone }}</td>

<td>

<a href="/fornecedor/{{ fornecedor.id }}" class="btn-detalhe">
🔍
</a>

</td>

<td>

<a href="/excluir_fornecedor/{{ fornecedor.id }}" class="btn-excluir">
🗑
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
